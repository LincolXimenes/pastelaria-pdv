name: CI

on:
  push:
    branches:
      - master
      - chore/**
  pull_request:
    branches:
      - master

jobs:
  security-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verificar arquivos sensíveis rastreados
        run: |
          if git ls-files | grep -E '^\.env$|^\.env\.[^e]'; then
            echo "ERRO: Arquivo .env detectado no repositório. Remova com: git rm --cached .env"
            exit 1
          fi
          echo "Nenhum arquivo .env rastreado. OK."

  test:
    runs-on: ubuntu-latest
    needs: security-check

    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
