name: CI

on:
  push:
    branches:
      - master
      - chore/**
  pull_request:
    branches:
      - master

jobs:
  security-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verificar arquivos sensíveis rastreados
        run: |
          echo "🔍 Verificando arquivos sensíveis no repositório..."
          
          # Verificar .env e variações
          if git ls-files | grep -E '^\.env$|^\.env\.[^e]|\.env\.local|\.env\.production'; then
            echo "❌ ERRO: Arquivo .env detectado no repositório"
            echo "Execute: git rm --cached .env"
            exit 1
          fi
          
          # Verificar chaves privadas
          if git ls-files | grep -E '\.pem$|\.key$|_rsa$|\.pfx$'; then
            echo "❌ ERRO: Arquivo de chave privada detectado"
            exit 1
          fi
          
          # Verificar arquivos de credenciais
          if git ls-files | grep -E 'credentials|secrets\.'; then
            echo "❌ ERRO: Arquivo de credenciais detectado"
            exit 1
          fi
          
          echo "✅ Nenhum arquivo sensível rastreado. OK."

      - name: Verificar dependências vulneráveis
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Instalar dependências
        run: npm ci
      
      - name: Audit de segurança
        run: |
          npm audit --audit-level=high
        continue-on-error: false

  test:
    runs-on: ubuntu-latest
    needs: security-check

    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # Job informativo - NÃO faz merge automático
  pr-info:
    runs-on: ubuntu-latest
    needs: [security-check, test]
    if: github.event_name == 'pull_request'
    steps:
      - name: Informar status
        run: |
          echo "✅ Todos os checks passaram!"
          echo "⚠️  ATENÇÃO: Este PR requer aprovação manual de um revisor humano."
          echo "🔒 Merge automático está DESABILITADO."
          echo "👤 Um mantenedor deve revisar e aprovar antes do merge."
